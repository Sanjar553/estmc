<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Mega Block Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #81d4fa; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 15px; left: 15px; color: white; background: rgba(0,0,0,0.7); padding: 12px; border-radius: 8px; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 24px; height: 24px; transform: translate(-50%, -50%); pointer-events: none; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: white; mix-blend-mode: difference; }
        #crosshair::before { left: 11px; width: 2px; height: 24px; }
        #crosshair::after { top: 11px; width: 24px; height: 2px; }
    </style>
</head>
<body>
    <div id="ui">
        <b>Sanjar's Minecraft</b><br>
        W,A,S,D - Yurish | Space - Sakrash<br>
        Chap tugma - Sindirish<br>
        O'ng tugma - Blok qo'yish
    </div>
    <div id="crosshair"></div>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x81d4fa);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Chiroq
        const light = new THREE.HemisphereLight(0xeeeeee, 0x888888, 1);
        scene.add(light);

        // Yer va Bloklar uchun tekstura o'rniga ranglar
        const blocks = [];
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        
        function createBlock(x, y, z, color = 0x4caf50) {
            const material = new THREE.MeshLambertMaterial({ color: color });
            const block = new THREE.Mesh(geometry, material);
            block.position.set(x, y, z);
            scene.add(block);
            blocks.push(block);
        }

        // Yer maydonini yaratish
        for(let x = -10; x < 10; x++) {
            for(let z = -10; z < 10; z++) {
                createBlock(x, 0, z, 0x795548);
            }
        }

        camera.position.set(0, 5, 10);
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(0, 0);

        // Tugmalarni boshqarish (Minecraft standartida)
        window.addEventListener('mousedown', (event) => {
            if (!document.pointerLockElement) {
                document.body.requestPointerLock();
                return;
            }

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(blocks);

            if (intersects.length > 0) {
                const intersect = intersects[0];

                // CHAP TUGMA (0) -> BLOKNI SINDIRISH
                if (event.button === 0) {
                    if (intersect.object.position.y !== 0 || blocks.length > 400) {
                        scene.remove(intersect.object);
                        blocks.splice(blocks.indexOf(intersect.object), 1);
                    }
                }
                // O'NG TUGMA (2) -> BLOK QO'YISH
                else if (event.button === 2) {
                    const pos = intersect.object.position.clone().add(intersect.face.normal);
                    createBlock(pos.x, pos.y, pos.z, 0x8bc34a);
                }
            }
        });

        // O'ng tugma menyusini taqiqlash
        window.addEventListener('contextmenu', e => e.preventDefault());

        // Kamera harakati (Oddiy boshqaruv)
        let keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function animate() {
            requestAnimationFrame(animate);
            if (keys['KeyW']) camera.translateZ(-0.1);
            if (keys['KeyS']) camera.translateZ(0.1);
            if (keys['KeyA']) camera.translateX(-0.1);
            if (keys['KeyD']) camera.translateX(0.1);
            renderer.render(scene, camera);
        }

        // Sichqoncha bilan burilish
        window.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
            }
        });

        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
